<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 Markdown 编辑器</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.11.2/dist/index.css">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: light;
      --app-bg: #eef2f7;
      --bar-bg: #ffffff;
      --bar-border: #d9e0ea;
      --text: #111827;
      --muted: #667085;
      --button-bg: #ffffff;
      --button-border: #cbd5e1;
      --button-hover: #f1f5f9;
      --primary-bg: #1f6feb;
      --primary-text: #ffffff;
      --danger-bg: #ffffff;
      --danger-text: #b42318;
      --editor-border: #cfd8e3;
      --shadow: 0 16px 44px rgba(15, 23, 42, 0.10);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --app-bg: #0f141b;
      --bar-bg: #151b24;
      --bar-border: #2a3441;
      --text: #e5e7eb;
      --muted: #9aa4b2;
      --button-bg: #1d2632;
      --button-border: #334155;
      --button-hover: #263241;
      --primary-bg: #3b82f6;
      --primary-text: #ffffff;
      --danger-bg: #24191b;
      --danger-text: #fca5a5;
      --editor-border: #303b49;
      --shadow: 0 18px 52px rgba(0, 0, 0, 0.32);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background: var(--app-bg);
      color: var(--text);
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    .app {
      display: grid;
      grid-template-rows: 58px 1fr 30px;
      width: 100vw;
      height: 100vh;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--bar-border);
      background: var(--bar-bg);
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.03);
    }

    .brand {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 86px);
      padding: 3px;
      border: 1px solid var(--button-border);
      border-radius: 8px;
      background: var(--button-bg);
    }

    .segmented button {
      border-color: transparent;
      background: transparent;
    }

    .segmented button.active {
      background: var(--primary-bg);
      color: var(--primary-text);
    }

    button {
      height: 32px;
      padding: 0 11px;
      border: 1px solid var(--button-border);
      border-radius: 7px;
      background: var(--button-bg);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      line-height: 30px;
      white-space: nowrap;
    }

    button:hover {
      background: var(--button-hover);
    }

    button.primary {
      border-color: var(--primary-bg);
      background: var(--primary-bg);
      color: var(--primary-text);
    }

    button.danger {
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    .workspace {
      min-height: 0;
      padding: 14px 16px 10px;
    }

    .editor-frame {
      height: 100%;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--editor-border);
      border-radius: 8px;
      background: var(--bar-bg);
      box-shadow: var(--shadow);
    }

    #vditor {
      width: 100%;
      height: 100%;
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border-top: 1px solid var(--bar-border);
      background: var(--bar-bg);
      color: var(--muted);
      font-size: 12px;
    }

    .statusbar span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    html[data-theme="dark"] .vditor {
      border-color: var(--editor-border);
    }

    html[data-theme="dark"] .vditor-toolbar,
    html[data-theme="dark"] .vditor-reset,
    html[data-theme="dark"] .vditor-ir,
    html[data-theme="dark"] .vditor-wysiwyg,
    html[data-theme="dark"] .vditor-sv,
    html[data-theme="dark"] .vditor-preview {
      background-color: #111827;
      color: #e5e7eb;
    }

    @media (max-width: 980px) {
      .topbar {
        grid-template-columns: 1fr;
        height: auto;
      }

      .app {
        grid-template-rows: auto 1fr 30px;
      }

      .control-group {
        flex-wrap: wrap;
      }

      .segmented {
        grid-template-columns: repeat(3, minmax(70px, 1fr));
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1 class="brand-title">我的 Markdown 编辑器</h1>
        <div class="brand-subtitle">本地自动保存，适合电脑宽屏编辑</div>
      </div>

      <div class="control-group segmented" aria-label="编辑模式">
        <button type="button" data-mode="ir" class="active">即时渲染</button>
        <button type="button" data-mode="wysiwyg">所见即所得</button>
        <button type="button" data-mode="sv">分屏预览</button>
      </div>

      <div class="control-group">
        <button type="button" id="themeToggle">黑暗模式</button>
        <button type="button" id="save" class="primary">保存</button>
        <button type="button" id="export">导出 .md</button>
        <button type="button" id="clear" class="danger">清空</button>
      </div>
    </header>

    <main class="workspace">
      <div class="editor-frame">
        <div id="vditor"></div>
      </div>
    </main>

    <footer class="statusbar">
      <span id="status">正在加载</span>
      <span id="meta">Vditor 3.11.2</span>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vditor@3.11.2/dist/index.min.js"></script>

  <script>
    const CONTENT_KEY = "my-vditor-content";
    const MODE_KEY = "my-vditor-mode";
    const THEME_KEY = "my-vditor-theme";
    const DEFAULT_CONTENT = `# 我的 Markdown 编辑器

这里可以写 Markdown，内容会自动保存在当前浏览器。

## 功能

- 即时渲染
- 所见即所得
- 分屏预览
- 黑暗模式
- 导出 Markdown 文件

\`\`\`c
printf("Hello Markdown!\\n");
\`\`\`
`;

    let vditor;
    let currentMode = localStorage.getItem(MODE_KEY) || "ir";
    let currentTheme = localStorage.getItem(THEME_KEY) || "light";

    const statusEl = document.getElementById("status");
    const metaEl = document.getElementById("meta");
    const themeToggle = document.getElementById("themeToggle");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode]"));

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function getContent() {
      if (vditor) {
        return vditor.getValue();
      }
      return localStorage.getItem(CONTENT_KEY) || DEFAULT_CONTENT;
    }

    function saveContent() {
      localStorage.setItem(CONTENT_KEY, getContent());
      setStatus("已保存到浏览器");
    }

    function applyModeButtons() {
      modeButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === currentMode);
      });
    }

    function applyTheme() {
      document.documentElement.dataset.theme = currentTheme;
      themeToggle.textContent = currentTheme === "dark" ? "浅色模式" : "黑暗模式";

      if (vditor && typeof vditor.setTheme === "function") {
        const contentTheme = currentTheme === "dark" ? "dark" : "light";
        const codeTheme = currentTheme === "dark" ? "native" : "github";
        vditor.setTheme(currentTheme, contentTheme, codeTheme);
      }
    }

    function createEditor(value) {
      document.getElementById("vditor").innerHTML = "";
      applyModeButtons();

      vditor = new Vditor("vditor", {
        height: "100%",
        mode: currentMode,
        lang: "zh_CN",
        theme: currentTheme,
        cdn: "https://cdn.jsdelivr.net/npm/vditor@3.11.2",
        placeholder: "开始写 Markdown...",
        cache: {
          enable: false
        },
        counter: {
          enable: true,
          type: "text"
        },
        toolbarConfig: {
          pin: true
        },
        outline: {
          enable: true,
          position: "right"
        },
        preview: {
          theme: {
            current: currentTheme === "dark" ? "dark" : "light"
          },
          hljs: {
            style: currentTheme === "dark" ? "native" : "github"
          },
          markdown: {
            autoSpace: true,
            mark: true,
            toc: true
          }
        },
        customWysiwygToolbar: function () {},
        toolbar: [
          "emoji", "headings", "bold", "italic", "strike", "link", "|",
          "list", "ordered-list", "check", "quote", "line", "code", "inline-code", "table", "|",
          "undo", "redo", "|", "preview", "outline", "fullscreen", "export"
        ],
        after: function () {
          vditor.setValue(value);
          applyTheme();
          setStatus("已就绪");
        },
        input: function (markdown) {
          localStorage.setItem(CONTENT_KEY, markdown);
          setStatus("自动保存完成");
        },
        focus: function () {
          setStatus("正在编辑");
        },
        blur: function () {
          saveContent();
        }
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (button.dataset.mode === currentMode) {
          return;
        }
        const value = getContent();
        currentMode = button.dataset.mode;
        localStorage.setItem(MODE_KEY, currentMode);
        createEditor(value);
      });
    });

    themeToggle.addEventListener("click", () => {
      currentTheme = currentTheme === "dark" ? "light" : "dark";
      localStorage.setItem(THEME_KEY, currentTheme);
      applyTheme();
      setStatus(currentTheme === "dark" ? "已切换到黑暗模式" : "已切换到浅色模式");
    });

    document.getElementById("save").addEventListener("click", saveContent);

    document.getElementById("export").addEventListener("click", () => {
      const blob = new Blob([getContent()], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "note.md";
      link.click();
      URL.revokeObjectURL(url);
      setStatus("已导出 note.md");
    });

    document.getElementById("clear").addEventListener("click", () => {
      if (!confirm("确定清空当前内容吗？")) {
        return;
      }
      localStorage.setItem(CONTENT_KEY, "");
      createEditor("");
      setStatus("已清空");
    });

    document.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
        event.preventDefault();
        saveContent();
      }
    });

    document.documentElement.dataset.theme = currentTheme;
    metaEl.textContent = "模式：" + currentMode.toUpperCase() + " · Vditor 3.11.2";
    createEditor(localStorage.getItem(CONTENT_KEY) || DEFAULT_CONTENT);
  </script>
</body>
</html>
